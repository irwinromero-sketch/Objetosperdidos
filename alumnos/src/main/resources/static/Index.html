<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Objetos Perdidos UAM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

<nav class="navbar navbar-expand-lg bg-warning">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold" href="#">📦 Objetos Perdidos UAM</a>
    </div>
</nav>

<div class="container mt-4">
    <h3 class="text-center mb-4">Gestión de Objetos Perdidos</h3>

    <!-- AGREGAR -->
    <div class="card mb-4">
        <div class="card-header bg-warning fw-bold">Agregar nuevo objeto</div>
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Descripción</label>
                    <input type="text" id="inputDescripcion" class="form-control" placeholder="Ej: Mochila azul">
                </div>
                <div class="col-md-6">
                    <label class="form-label">ID del alumno que lo reporta</label>
                    <input type="number" id="inputAlumno" class="form-control" placeholder="Ej: 30">
                </div>
            </div>
            <div class="mt-3">
                <button class="btn btn-warning" onclick="guardarObjeto()">Guardar objeto</button>
            </div>
            <div id="mensajeGuardar" class="mt-2"></div>
        </div>
    </div>

    <!-- BUSCAR -->
    <div class="card mb-4">
        <div class="card-header fw-bold">Buscar</div>
        <div class="card-body">
            <div class="row g-2 align-items-end">
                <div class="col-md-3">
                    <label class="form-label">Por ID de objeto</label>
                    <input type="number" id="inputBuscarObjeto" class="form-control" placeholder="ID...">
                </div>
                <div class="col-md-2">
                    <button class="btn btn-dark w-100" onclick="buscarPorId()">Buscar</button>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Por ID de alumno</label>
                    <input type="number" id="inputBuscarAlumno" class="form-control" placeholder="ID...">
                </div>
                <div class="col-md-2">
                    <button class="btn btn-dark w-100" onclick="buscarPorAlumno()">Buscar</button>
                </div>
            </div>
            <div id="resultadoBusqueda" class="mt-3"></div>
        </div>
    </div>

    <!-- TABLA -->
    <div class="card mb-4">
        <div class="card-header fw-bold d-flex justify-content-between align-items-center">
            Todos los Objetos
            <button class="btn btn-sm btn-dark" onclick="cargarTodos()">Actualizar</button>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-bordered table-hover text-center align-middle">
                    <thead class="table-warning">
                    <tr>
                        <th>ID</th>
                        <th>Descripción</th>
                        <th>Fecha</th>
                        <th>Estado</th>
                        <th>Alumno</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody id="tablaObjetos"></tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<!-- MODAL EDITAR -->
<div class="modal fade" id="modalEditar" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-warning">
                <h5 class="modal-title fw-bold">Editar Objeto</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <div class="mb-3">
                    <label class="form-label">Descripción</label>
                    <input type="text" id="editDescripcion" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Estado</label>
                    <select id="editEstado" class="form-select">
                        <option value="PERDIDO">PERDIDO</option>
                        <option value="ENCONTRADO">ENCONTRADO</option>
                    </select>
                </div>
                <div id="mensajeEditar"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button class="btn btn-warning" onclick="guardarEdicion()">Guardar Cambios</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
<script>cargarTodos();</script>
</body>
</html>
