<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Info País</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/pais.css">
</head>
<body>

<nav class="navbar navbar-expand-lg bg-warning">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold" href="#">🌍 Info País UAM</a>
    </div>
</nav>

<div class="container mt-4">
    <h3 class="text-center mb-4">Buscar información de un país</h3>

    <div class="text-center mb-4">
        <input id="inputPais" type="text" class="form-control d-inline w-25" placeholder="Ej: mexico, france, japan...">
        <button class="btn btn-warning ms-2" onclick="buscarPais()">Buscar</button>
    </div>

    <div id="errorMsg" class="text-center text-danger mb-3" style="display:none;">
        No se encontró información para ese país.
    </div>

    <div id="resultado" style="display:none;">

        <!-- FILA 1: INFO GENERAL -->
        <div class="row mb-4">
            <div class="col-md-4 text-center">
                <img id="bandera" src="" alt="Bandera" class="img-fluid border shadow" style="max-height:150px;">
                <h4 id="nombrePais" class="mt-3 fw-bold"></h4>
                <p id="moneda" class="text-muted"></p>
            </div>
            <div class="col-md-8">
                <div class="card h-100">
                    <div class="card-header bg-warning fw-bold">Información General</div>
                    <div class="card-body">
                        <table class="table table-bordered mb-0">
                            <tbody>
                            <tr>
                                <th>Capital</th>
                                <td id="capital"></td>
                            </tr>
                            <tr>
                                <th>Región</th>
                                <td id="region"></td>
                            </tr>
                            <tr>
                                <th>Área</th>
                                <td id="area"></td>
                            </tr>
                            <tr>
                                <th>Coordenadas</th>
                                <td id="coordenadas"></td>
                            </tr>
                            <tr>
                                <th>Mapa</th>
                                <td><a id="mapaUrl" href="#" target="_blank">Ver en OpenStreetMap</a></td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- FILA 2: CLIMA Y ECONOMÍA -->
        <div class="row mb-4">
            <div class="col-md-6">
                <div class="card h-100">
                    <div class="card-header bg-info text-white fw-bold">🌤 Clima actual</div>
                    <div class="card-body">
                        <table class="table table-bordered mb-0">
                            <tbody>
                            <tr>
                                <th>Temperatura</th>
                                <td id="temperatura"></td>
                            </tr>
                            <tr>
                                <th>Humedad</th>
                                <td id="humedad"></td>
                            </tr>
                            <tr>
                                <th>Condición</th>
                                <td id="clima"></td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card h-100">
                    <div class="card-header bg-success text-white fw-bold">💰 Economía</div>
                    <div class="card-body">
                        <table class="table table-bordered mb-0">
                            <tbody>
                            <tr>
                                <th>1 USD en MXN</th>
                                <td id="dolarEnMxn"></td>
                            </tr>
                            <tr>
                                <th>Bitcoin en USD</th>
                                <td id="bitcoinEnUsd"></td>
                            </tr>
                            <tr>
                                <th>Bitcoin en MXN</th>
                                <td id="bitcoinEnMxn"></td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/pais.js"></script>
</body>
</html>
